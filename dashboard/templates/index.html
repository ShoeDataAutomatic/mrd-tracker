<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRD Trend Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f4f4f2;
      color: #1a1a1a;
      font-size: 14px;
    }

    /* ---- Product image thumbnail ---- */
    .thumb-wrap {
      width: 52px;
      height: 52px;
      border-radius: 6px;
      overflow: hidden;
      background: #f0f0ec;
      flex-shrink: 0;
      position: relative;
    }
    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb-wrap .no-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: 20px;
    }

    /* ---- Image preview popover on hover ---- */
    .thumb-wrap:hover .preview {
      display: block;
    }
    .preview {
      display: none;
      position: absolute;
      top: 0;
      left: 60px;
      z-index: 100;
      width: 160px;
      height: 160px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      background: #f0f0ec;
      pointer-events: none;
    }
    .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ---- Header ---- */
    .header {
      background: #1a1a1a;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header h1 { color: #fff; font-size: 17px; font-weight: 500; }
    .header .sub { color: #888; font-size: 12px; }

    /* ---- Controls bar ---- */
    .controls {
      background: #fff;
      padding: 12px 28px;
      border-bottom: 1px solid #e8e8e4;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .controls label { font-size: 12px; color: #888; margin-right: 4px; }
    .controls select, .controls input {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      background: #fff;
      color: #1a1a1a;
      outline: none;
    }
    .controls select:focus, .controls input:focus { border-color: #888; }
    .btn-refresh {
      margin-left: auto;
      background: #1a1a1a;
      color: #fff;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-refresh:hover { background: #333; }

    /* ---- Stats row ---- */
    .stats {
      display: flex;
      gap: 16px;
      padding: 16px 28px;
    }
    .stat-card {
      background: #fff;
      border-radius: 8px;
      padding: 14px 20px;
      min-width: 140px;
      border: 1px solid #e8e8e4;
    }
    .stat-card .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .value { font-size: 22px; font-weight: 600; margin-top: 4px; color: #1a1a1a; }
    .stat-card .sub   { font-size: 11px; color: #aaa; margin-top: 2px; }

    /* ---- Table ---- */
    .table-wrap {
      padding: 0 28px 28px;
    }
    .table-container {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e8e8e4;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #f9f9f7; }

    /* Sort header row */
    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 1px solid #e8e8e4;
      white-space: nowrap;
    }
    th.sortable {
      cursor: pointer;
      user-select: none;
    }
    th.sortable:hover { color: #444; }
    th .sort-icon { margin-left: 4px; opacity: 0.3; }
    th.sort-asc  .sort-icon::after { content: ' ▲'; opacity: 1; color: #1a6699; }
    th.sort-desc .sort-icon::after { content: ' ▼'; opacity: 1; color: #1a6699; }
    th:not(.sort-asc):not(.sort-desc) .sort-icon::after { content: ' ⇅'; }

    /* Filter input row */
    .filter-row th {
      padding: 5px 8px;
      background: #f4f4f2;
      border-bottom: 2px solid #e0e0dc;
      cursor: default;
    }
    .filter-row input,
    .filter-row select {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 4px 7px;
      font-size: 11px;
      background: #fff;
      color: #1a1a1a;
      outline: none;
      text-transform: none;
      letter-spacing: 0;
      font-weight: normal;
    }
    .filter-row input:focus,
    .filter-row select:focus { border-color: #888; }

    td {
      padding: 11px 14px;
      border-bottom: 1px solid #f0f0ec;
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }

    .rank-num { color: #bbb; font-size: 12px; width: 32px; }
    .product-name {
      font-weight: 500;
      color: #1a1a1a;
      text-decoration: none;
      display: block;
    }
    .product-name:hover { color: #0066cc; }
    .product-retailer { font-size: 11px; color: #aaa; margin-top: 2px; }

    .score-val {
      font-weight: 600;
      font-size: 15px;
      color: #1a6699;
    }
    .score-bar-wrap { height: 4px; background: #f0f0ec; border-radius: 2px; margin-top: 4px; width: 70px; }
    .score-bar { height: 4px; background: #1a6699; border-radius: 2px; }

    .price { font-size: 13px; color: #555; }
    .page-rank { font-size: 12px; color: #888; }
    .days { font-size: 12px; color: #aaa; }
    .cat-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #f0f0ec;
      color: #666;
      text-transform: capitalize;
    }

    /* ---- Signal tags ---- */
    .tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .tag {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
      white-space: nowrap;
    }
    .tag-new      { background: #e8f5e9; color: #2e7d32; }
    .tag-runner   { background: #e3f2fd; color: #1565c0; }
    .tag-featured { background: #fff3e0; color: #e65100; }
    .tag-rising   { background: #f3e5f5; color: #6a1b9a; }
    .tag-restock  { background: #e0f7fa; color: #006064; }
    .tag-selling  { background: #fce4ec; color: #880e4f; }
    .tag-review   { background: #f9fbe7; color: #558b2f; }
    .tag-markdown { background: #fafafa; color: #999; }
    .tag-removed  { background: #ffebee; color: #c62828; }

    /* ---- Sparkline ---- */
    .sparkline { width: 60px; height: 24px; }

    /* ---- Empty / loading state ---- */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }
    .empty-state p { margin-top: 8px; font-size: 13px; }

    .loading { opacity: .4; }

    /* ---- Category filter pills ---- */
    .category-pills {
      background: #fff;
      padding: 10px 28px;
      border-bottom: 1px solid #e8e8e4;
      display: flex;
      gap: 8px;
    }
    .pill {
      background: #f4f4f2;
      border: 1px solid #e0e0dc;
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 13px;
      cursor: pointer;
      color: #555;
      transition: all .15s;
    }
    .pill:hover { background: #eaeae6; border-color: #ccc; }
    .pill.active {
      background: #1a1a1a;
      border-color: #1a1a1a;
      color: #fff;
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>MRD Trend Tracker</h1>
    <div class="sub">Footwear trend intelligence</div>
  </div>
</div>

<div class="controls">
  <div>
    <label>Retailer</label>
    <select id="filter-retailer">
      <option value="">All retailers</option>
      {% for r in retailers %}
      <option value="{{ r.key }}">{{ r.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label>Window</label>
    <select id="filter-days">
      <option value="7">7 days</option>
      <option value="30" selected>30 days</option>
      <option value="60">60 days</option>
      <option value="90">90 days</option>
    </select>
  </div>
  <div>
    <label>Show</label>
    <select id="filter-limit">
      <option value="20">Top 20</option>
      <option value="50" selected>Top 50</option>
      <option value="100">Top 100</option>
      <option value="9999">All</option>
    </select>
  </div>
  <div>
    <label>Search</label>
    <input type="text" id="filter-search" placeholder="Filter by name..." style="width:200px;">
  </div>
  <button class="btn-refresh" onclick="loadAll()">Refresh</button>
</div>

<div class="category-pills">
  <button class="pill active" onclick="setCategory('')">All</button>
  <button class="pill" onclick="setCategory('women')">Women</button>
  <button class="pill" onclick="setCategory('men')">Men</button>
  <button class="pill" onclick="setCategory('girls')">Girls</button>
  <button class="pill" onclick="setCategory('boys')">Boys</button>
</div>

<div class="stats" id="stats-row">
  <div class="stat-card"><div class="label">Products tracked</div><div class="value" id="stat-total">—</div></div>
  <div class="stat-card"><div class="label">New today</div><div class="value" id="stat-new">—</div></div>
  <div class="stat-card"><div class="label">Top product</div><div class="value" id="stat-top" style="font-size:14px;font-weight:500;margin-top:8px;">—</div><div class="sub" id="stat-top-score"></div></div>
</div>

<div class="table-wrap">
  <div class="table-container">
    <table>
      <thead>
        <!-- Sort header row -->
        <tr id="sort-row">
          <th style="width:40px;" class="no-sort">#</th>
          <th style="width:60px;" class="no-sort"></th>
          <th class="sortable" data-col="name">Product<span class="sort-icon"></span></th>
          <th class="sortable" data-col="retailer">Retailer<span class="sort-icon"></span></th>
          <th class="sortable" data-col="category">Category<span class="sort-icon"></span></th>
          <th class="sortable sort-desc" data-col="total_score">Score<span class="sort-icon"></span></th>
          <th class="sortable" data-col="latest_price">Price<span class="sort-icon"></span></th>
          <th class="sortable" data-col="latest_rank">Page rank<span class="sort-icon"></span></th>
          <th class="sortable" data-col="days_tracked">Age<span class="sort-icon"></span></th>
          <th class="no-sort">Signals</th>
          <th class="no-sort">Trend</th>
        </tr>
        <!-- Per-column filter row -->
        <tr class="filter-row">
          <th></th>
          <th></th>
          <th><input type="text"   id="col-filter-name"     placeholder="Name…"></th>
          <th><input type="text"   id="col-filter-retailer" placeholder="Retailer…"></th>
          <th><input type="text"   id="col-filter-category" placeholder="Category…"></th>
          <th><input type="number" id="col-filter-score-min" placeholder="Min score" style="width:48%;margin-right:2%;">
              <input type="number" id="col-filter-score-max" placeholder="Max" style="width:48%;"></th>
          <th><input type="number" id="col-filter-price-min" placeholder="Min £" style="width:48%;margin-right:2%;">
              <input type="number" id="col-filter-price-max" placeholder="Max £" style="width:48%;"></th>
          <th><input type="number" id="col-filter-rank-max"  placeholder="≤ rank"></th>
          <th><input type="number" id="col-filter-age-min"   placeholder="Min days"></th>
          <th>
            <select id="col-filter-signal">
              <option value="">Any signal</option>
              <option>New arrival</option>
              <option>Long runner</option>
              <option>Featured</option>
              <option>Rising</option>
              <option>Restocked</option>
              <option>Selling through</option>
              <option>Review spike</option>
              <option>Marked down</option>
              <option>Removed</option>
            </select>
          </th>
          <th></th>
        </tr>
      </thead>
      <tbody id="product-table-body">
        <tr><td colspan="11"><div class="empty-state">Loading...</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  let allProducts    = [];
  let maxScore       = 1;
  let activeCategory = '';
  let sortCol        = 'total_score';
  let sortDir        = 'desc';   // 'asc' | 'desc'

  // ── Category pills ──────────────────────────────────────────────────────────
  function setCategory(cat) {
    activeCategory = cat;
    document.querySelectorAll('.pill').forEach(p => {
      p.classList.toggle('active', p.textContent.toLowerCase() === (cat || 'all'));
    });
    renderTable();
  }

  // ── Sorting ─────────────────────────────────────────────────────────────────
  document.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col;
        sortDir = col === 'total_score' ? 'desc' : 'asc';
      }
      // Update header classes
      document.querySelectorAll('th.sortable').forEach(h => {
        h.classList.remove('sort-asc', 'sort-desc');
      });
      th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
      renderTable();
    });
  });

  // ── Column filters ───────────────────────────────────────────────────────────
  const COL_FILTER_IDS = [
    'col-filter-name', 'col-filter-retailer', 'col-filter-category',
    'col-filter-score-min', 'col-filter-score-max',
    'col-filter-price-min', 'col-filter-price-max',
    'col-filter-rank-max', 'col-filter-age-min', 'col-filter-signal'
  ];
  COL_FILTER_IDS.forEach(id =>
    document.getElementById(id).addEventListener('input', renderTable)
  );

  const TAG_CLASSES = {
    'New arrival':    'tag-new',
    'Long runner':    'tag-runner',
    'Featured':       'tag-featured',
    'Rising':         'tag-rising',
    'Restocked':      'tag-restock',
    'Selling through':'tag-selling',
    'Review spike':   'tag-review',
    'Marked down':    'tag-markdown',
    'Removed':        'tag-removed',
  };

  // ── Stats ────────────────────────────────────────────────────────────────────
  async function loadStats() {
    const retailer = document.getElementById('filter-retailer').value;
    const params   = retailer ? `?retailer=${retailer}` : '';
    const res      = await fetch('/api/stats' + params);
    const data     = await res.json();
    document.getElementById('stat-total').textContent      = data.total_products;
    document.getElementById('stat-new').textContent        = data.new_today;
    document.getElementById('stat-top').textContent        = data.top_product;
    document.getElementById('stat-top-score').textContent  = data.top_score ? `${data.top_score.toFixed(0)} pts` : '';
  }

  // ── Rankings ─────────────────────────────────────────────────────────────────
  async function loadRankings() {
    const retailer = document.getElementById('filter-retailer').value;
    const days     = document.getElementById('filter-days').value;
    const limit    = document.getElementById('filter-limit').value;

    const params = new URLSearchParams({ days, limit });
    if (retailer) params.set('retailer', retailer);

    const res   = await fetch('/api/rankings?' + params);
    allProducts = await res.json();
    maxScore    = Math.max(...allProducts.map(p => p.total_score), 1);
    renderTable();
  }

  // ── Render ───────────────────────────────────────────────────────────────────
  function renderTable() {
    const globalSearch = document.getElementById('filter-search').value.toLowerCase();

    // Read column filters
    const colName      = document.getElementById('col-filter-name').value.toLowerCase();
    const colRetailer  = document.getElementById('col-filter-retailer').value.toLowerCase();
    const colCategory  = document.getElementById('col-filter-category').value.toLowerCase();
    const colScoreMin  = parseFloat(document.getElementById('col-filter-score-min').value) || null;
    const colScoreMax  = parseFloat(document.getElementById('col-filter-score-max').value) || null;
    const colPriceMin  = parseFloat(document.getElementById('col-filter-price-min').value) || null;
    const colPriceMax  = parseFloat(document.getElementById('col-filter-price-max').value) || null;
    const colRankMax   = parseInt(document.getElementById('col-filter-rank-max').value)   || null;
    const colAgeMin    = parseInt(document.getElementById('col-filter-age-min').value)    || null;
    const colSignal    = document.getElementById('col-filter-signal').value;

    const tbody = document.getElementById('product-table-body');

    let visible = allProducts.filter(p => {
      const cat      = (p.category || '').toLowerCase();
      const name     = (p.name     || '').toLowerCase();
      const retailer = (p.retailer || '').toLowerCase();

      // Category pills
      if (activeCategory) {
        const segments = cat.split('/');
        if (!segments.includes(activeCategory)) return false;
      }
      // Global search
      if (globalSearch && !name.includes(globalSearch) && !cat.includes(globalSearch)) return false;

      // Column filters
      if (colName     && !name.includes(colName))         return false;
      if (colRetailer && !retailer.includes(colRetailer)) return false;
      if (colCategory && !cat.includes(colCategory))      return false;
      if (colScoreMin !== null && p.total_score < colScoreMin) return false;
      if (colScoreMax !== null && p.total_score > colScoreMax) return false;
      if (colPriceMin !== null && (p.latest_price == null || p.latest_price < colPriceMin)) return false;
      if (colPriceMax !== null && (p.latest_price == null || p.latest_price > colPriceMax)) return false;
      if (colRankMax  !== null && (p.latest_rank  == null || p.latest_rank  > colRankMax))  return false;
      if (colAgeMin   !== null && (p.days_tracked == null || p.days_tracked < colAgeMin))   return false;
      if (colSignal   && !(p.signal_tags || []).includes(colSignal)) return false;

      return true;
    });

    // Sort
    visible.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va == null) va = sortDir === 'asc' ? Infinity : -Infinity;
      if (vb == null) vb = sortDir === 'asc' ? Infinity : -Infinity;
      if (typeof va === 'string') va = va.toLowerCase();
      if (typeof vb === 'string') vb = vb.toLowerCase();
      if (va < vb) return sortDir === 'asc' ? -1 :  1;
      if (va > vb) return sortDir === 'asc' ?  1 : -1;
      return 0;
    });

    if (!visible.length) {
      tbody.innerHTML = `<tr><td colspan="11"><div class="empty-state">
        <strong>No products found.</strong>
        <p>The scraper hasn't run yet, or no data matches your filters.</p>
        <p style="margin-top:8px;">Run <code>python run.py --scrape</code> to collect data.</p>
      </div></td></tr>`;
      return;
    }

    tbody.innerHTML = visible.map((p, i) => {
      const price    = p.latest_price  != null ? `£${p.latest_price.toFixed(2)}` : '—';
      const rank     = p.latest_rank   != null ? `#${p.latest_rank}` : '—';
      const age      = p.days_tracked  != null ? `${p.days_tracked}d` : '—';
      const barPct   = Math.min(100, (p.total_score / maxScore) * 100).toFixed(0);
      const catRaw   = (p.category || '').replace(/-/g, ' ');
      const catDisp  = catRaw || '—';

      const tagsHtml = (p.signal_tags || []).map(t =>
        `<span class="tag ${TAG_CLASSES[t] || 'tag-markdown'}">${t}</span>`
      ).join('');

      const sparkSvg = buildSparkline(p.score_series || []);

      const imgHtml = p.image_url
        ? `<div class="thumb-wrap" style="position:relative;">
             <img src="${p.image_url}" alt="${p.name}" loading="lazy"
                  onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'>&#128094;</div>'">
             <div class="preview"><img src="${p.image_url}" alt="${p.name}"></div>
           </div>`
        : `<div class="thumb-wrap"><div class="no-img">&#128094;</div></div>`;

      return `<tr>
        <td class="rank-num">${i + 1}</td>
        <td style="padding:8px 6px;">${imgHtml}</td>
        <td>
          <a class="product-name" href="${p.url}" target="_blank">${p.name}</a>
        </td>
        <td style="font-size:12px;color:#555;">${p.retailer}</td>
        <td><span class="cat-badge">${catDisp}</span></td>
        <td>
          <div class="score-val">${p.total_score.toFixed(0)}</div>
          <div class="score-bar-wrap"><div class="score-bar" style="width:${barPct}%"></div></div>
        </td>
        <td class="price">${price}</td>
        <td class="page-rank">${rank}</td>
        <td class="days">${age}</td>
        <td><div class="tags">${tagsHtml}</div></td>
        <td>${sparkSvg}</td>
      </tr>`;
    }).join('');
  }

  function buildSparkline(series) {
    if (!series || series.length < 2) return '<svg class="sparkline"></svg>';
    const vals   = series.map(s => s.score);
    const maxVal = Math.max(...vals, 1);
    const w = 60, h = 24;
    const pts = vals.map((v, i) => {
      const x = (i / (vals.length - 1)) * w;
      const y = h - (v / maxVal) * (h - 4) - 2;
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    return `<svg class="sparkline" viewBox="0 0 ${w} ${h}">
      <polyline points="${pts}" fill="none" stroke="#1a6699" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>`;
  }

  function loadAll() {
    loadStats();
    loadRankings();
  }

  // Top-bar event listeners
  ['filter-retailer','filter-days','filter-limit'].forEach(id =>
    document.getElementById(id).addEventListener('change', loadAll)
  );
  document.getElementById('filter-search').addEventListener('input', renderTable);

  // Initial load
  loadAll();
</script>
</body>
</html>
