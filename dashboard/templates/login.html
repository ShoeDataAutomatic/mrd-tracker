<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRD Tracker — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #f7f7f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
    }

    .login-logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: #111;
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #111;
      background: #fafafa;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 20px;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #111;
      background: #fff;
    }

    .error-msg {
      background: #fff3f1;
      border: 1.5px solid #E8563A;
      border-radius: 8px;
      color: #E8563A;
      font-size: 12px;
      font-weight: 700;
      padding: 10px 14px;
      margin-bottom: 20px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .15s;
      margin-top: 4px;
    }

    button[type="submit"]:hover { background: #333; }

    @media (max-width: 440px) {
      .login-card { padding: 36px 24px 28px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">MRD Tracker</div>
    <div class="login-subtitle">Trend Intelligence</div>

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" autofocus required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>

      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
